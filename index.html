<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fusion Power</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#050510,#000);
color:white;
text-align:center;
overflow:hidden;
}

h1{
margin-top:30px;
font-size:28px;
text-shadow:0 0 20px cyan;
}

.container{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:80px;
flex-wrap:wrap;
}

img{
width:280px;
border-radius:20px;
box-shadow:0 0 30px #00ffff55;
transition:1s;
}

.plus{
font-size:40px;
}

button{
margin-top:40px;
padding:18px 50px;
font-size:22px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff00cc,#ff5500);
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff00cc;
}

button:hover{
transform:scale(1.1);
}

#result{
display:none;
margin-top:40px;
position:relative;
z-index:10;
}

#result img{
width:320px;
animation:zoom 2s infinite;
box-shadow:0 0 40px yellow;
}

@keyframes zoom{

0%{
transform:scale(1);
}

50%{
transform:scale(1.2);
}

100%{
transform:scale(1);
}

}

.lightning{
position:absolute;
height:4px;
width:0;
background:white;
top:50%;
left:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 20px white,0 0 40px cyan;
}

.confetti{
position:absolute;
width:8px;
height:8px;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* mobile */

@media(max-width:600px){

img{
width:200px;
}

#result img{
width:240px;
}

button{
font-size:18px;
padding:14px 35px;
}

}

</style>

</head>

<body>

<h1>⚡ Fusion Combine ⚡</h1>

<div class="container">

<img id="p1" src="person1.jpg">

<div class="plus">+</div>

<img id="p2" src="person2.jpg">

</div>

<button onclick="fusion()">รวมร่าง!</button>

<div id="result">
<h2>🔥 ผลลัพธ์ 🔥</h2>
<img src="fusion.jpg">
</div>

<div class="lightning" id="lightning"></div>

<audio id="sound">
<source src="https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3">
</audio>

<script>

function fusion(){

let p1=document.getElementById("p1")
let p2=document.getElementById("p2")
let lightning=document.getElementById("lightning")
let sound=document.getElementById("sound")

sound.play()

if(navigator.vibrate){
navigator.vibrate([200,100,200])
}

p1.style.transform="translateX(140px) rotate(360deg)"
p2.style.transform="translateX(-140px) rotate(-360deg)"

setTimeout(()=>{

lightning.style.width="400px"

},500)

setTimeout(()=>{

lightning.style.width="0"

},900)

setTimeout(()=>{

p1.style.display="none"
p2.style.display="none"

document.getElementById("result").style.display="block"

confetti()

},1400)

}

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background="hsl("+Math.random()*360+",100%,50%)"

c.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(c)

}

}

</script>

</body>
</html>
